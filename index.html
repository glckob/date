<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Calculator</title>

  <!-- Embed Fonts (IMPORTANT for iOS) -->
  <style>
    @font-face {
      font-family: 'KhmerOSMuolLight';
      src: url('KhmerOSmuollight.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Hanuman';
      src: url('Hanuman-Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Hanuman', serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .title {
      font-family: 'KhmerOSMuolLight';
      text-align: center;
      font-size: 22px;
      margin-bottom: 10px;
    }

    h2 { text-align: center; }

    label {
      display: block;
      margin-top: 10px;
    }

    .row {
      display: flex;
      gap: 5px;
    }

    select {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: 'Hanuman';
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: black;
      font-weight: bold;
      font-family: 'Hanuman';
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">ម៉ាស៊ីនកិនស្រូវលីអួង</div>

    <h2>គណនាកាលបរិច្ឆេទ</h2>

    <label>ថ្ងៃចាប់ផ្តើម</label>
    <div class="row">
      <select id="sDay"></select>
      <select id="sMonth"></select>
      <select id="sYear"></select>
    </div>

    <label>ថ្ងៃបច្ចុប្បន្ន</label>
    <div class="row">
      <select id="eDay"></select>
      <select id="eMonth"></select>
      <select id="eYear"></select>
    </div>

    <button onclick="calculate()">គណនា</button>

    <div class="result" id="result">លទ្ធផលនឹងបង្ហាញទីនេះ</div>
  </div>

  <script>
    function fillSelect(id, start, end) {
      const el = document.getElementById(id);
      for (let i = start; i <= end; i++) {
        let val = i.toString().padStart(2, '0');
        let opt = document.createElement('option');
        opt.value = i;
        opt.text = val;
        el.appendChild(opt);
      }
    }

    // Fill dropdowns
    fillSelect('sDay', 1, 31);
    fillSelect('eDay', 1, 31);
    fillSelect('sMonth', 1, 12);
    fillSelect('eMonth', 1, 12);
    fillSelect('sYear', 2000, 2035);
    fillSelect('eYear', 2000, 2035);

    // Set today default
    const today = new Date();
    document.getElementById('eDay').value = today.getDate();
    document.getElementById('eMonth').value = today.getMonth() + 1;
    document.getElementById('eYear').value = today.getFullYear();

    function calculate() {
      let start = new Date(
        document.getElementById('sYear').value,
        document.getElementById('sMonth').value - 1,
        document.getElementById('sDay').value
      );

      let end = new Date(
        document.getElementById('eYear').value,
        document.getElementById('eMonth').value - 1,
        document.getElementById('eDay').value
      );

      if (end < start) [start, end] = [end, start];

      let months = (end.getFullYear() - start.getFullYear()) * 12;
      months += end.getMonth() - start.getMonth();

      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      const totalDays = Math.floor((end - start) / (1000 * 60 * 60 * 24));

      document.getElementById('result').innerHTML = `
        ${months} ខែ ${days} ថ្ងៃ<br>
        (${totalDays} ថ្ងៃសរុប)
      `;
    }
  </script>
</body>
</html>
