<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Calculator</title>
  <style>
    body {
      font-family: 'Hanuman', serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    @font-face {
      font-family: 'KhmerOSMuolLight';
      src: local('Khmer OS Muol Light');
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .title {
      font-family: 'KhmerOSMuolLight', serif;
      text-align: center;
      font-size: 22px;
      margin-bottom: 10px;
    }

    h2 { text-align: center; }

    input, button, label {
      font-family: 'Hanuman', serif;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input { background: #334155; color: white; }
    button { background: #22c55e; color: black; font-weight: bold; }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #020617;
      border-radius: 10px;
      text-align: center;
      font-family: 'Hanuman', serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">ម៉ាស៊ីនកិនស្រូវលីអួង</div>

    <h2>គណនាកាលបរិច្ឆេទ</h2>

    <label>ថ្ងៃចាប់ផ្តើម</label>
    <input type="date" id="startDate">

    <label>ថ្ងៃបច្ចុប្បន្ន (អាចកែបាន)</label>
    <input type="date" id="endDate">

    <button onclick="calculate()">គណនា</button>

    <div class="result" id="result">លទ្ធផលនឹងបង្ហាញទីនេះ</div>
  </div>

  <script>
    // Default = today
    document.getElementById('endDate').valueAsDate = new Date();

    function calculate() {
      const startVal = document.getElementById('startDate').value;
      const endVal = document.getElementById('endDate').value;

      if (!startVal || !endVal) {
        document.getElementById('result').innerText = "សូមបញ្ចូលថ្ងៃឲ្យគ្រប់";
        return;
      }

      let start = new Date(startVal);
      let end = new Date(endVal);

      if (end < start) {
        [start, end] = [end, start];
      }

      let months = (end.getFullYear() - start.getFullYear()) * 12;
      months += end.getMonth() - start.getMonth();

      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      const diffTime = Math.abs(end - start);
      const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

      document.getElementById('result').innerHTML = `
        ${months} ខែ ${days} ថ្ងៃ<br>
        (${totalDays} ថ្ងៃសរុប)
      `;
    }
  </script>
</body>
</html>
