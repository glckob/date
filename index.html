<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Calculator</title>

  <!-- Embed Google Fonts for Khmer Support -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Moul&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Hanuman', serif;
      background: #f1f5f9; /* ពណ៌សប្រផេះខ្ចី ស្រឡះភ្នែក */
      color: #0f172a; /* អក្សរពណ៌ខ្មៅដិតច្បាស់ */
      display: flex;
      justify-content: center;
      align-items: flex-start; 
      min-height: 100vh;
      padding-top: 40px; 
      margin: 0;
      box-sizing: border-box;
    }

    .card {
      background: #ffffff; /* ផ្ទៃកាតពណ៌សក្បុស */
      padding: 24px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* ស្រមោលព្រាលៗ */
      border: 1px solid #e2e8f0;
    }

    .title {
      font-family: 'Moul', serif; 
      text-align: center;
      font-size: 24px;
      margin-bottom: 5px;
      color: #1d4ed8; /* ពណ៌ខៀវចាស់ ដិតច្បាស់ល្អ */
    }

    h2 { 
      text-align: center; 
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 20px; 
      color: #475569; /* ពណ៌ប្រផេះចាស់ */
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      font-size: 18px; 
      font-weight: bold; /* ធ្វើឲ្យអក្សរចំណងជើងដិត */
      color: #0f172a; 
    }

    .row {
      display: flex;
      gap: 10px; 
    }

    select {
      flex: 1;
      padding: 14px 10px; 
      border-radius: 8px;
      border: 2px solid #cbd5e1; /* បន្ទាត់ជុំវិញរាងក្រាស់បន្តិច ងាយមើល */
      font-family: 'Hanuman', serif;
      background: #ffffff;
      color: #0f172a; /* លេខពណ៌ខ្មៅដិត */
      font-size: 22px; 
      font-weight: bold;
      outline: none;
      appearance: none;
      text-align: center; 
    }
    
    select:focus {
      border-color: #2563eb; /* ពេលចុចចេញបន្ទាត់ពណ៌ខៀវច្បាស់ */
    }

    button {
      width: 100%;
      padding: 18px; 
      margin-top: 25px;
      border-radius: 10px;
      border: none;
      background: #16a34a; /* ពណ៌បៃតងចាស់បន្តិច ងាយមើលលើផ្ទៃស */
      color: white;
      font-size: 28px; 
      font-weight: bold;
      font-family: 'Hanuman', serif;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #15803d;
    }

    button:active {
      transform: scale(0.98);
    }

    .result {
      margin-top: 25px;
      padding: 20px 15px;
      background: #f8fafc; /* ផ្ទៃលទ្ធផលពណ៌សប្រផេះខ្ចី */
      border-radius: 10px;
      text-align: center;
      font-size: 24px; 
      border: 2px solid #e2e8f0;
      min-height: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .total-days {
      font-size: 18px; 
      color: #475569;
      margin-top: 8px;
    }

    .formula-section {
      margin-top: 15px;
      padding: 15px;
      background: #eff6ff; /* ផ្ទៃពណ៌ខៀវខ្ចី ងាយចំណាំ */
      border-radius: 10px;
      border: 2px dashed #bfdbfe; /* បន្ទាត់ដាច់ៗ */
      font-size: 18px; /* អក្សរធំល្មមងាយអាន */
      color: #1e3a8a;
      text-align: left;
      display: none; /* លាក់សិន វានឹងបង្ហាញពេលចុចគណនា */
      line-height: 1.6;
    }

    .credit {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #64748b; /* ពណ៌ប្រផេះស្រាល */
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">ម៉ាស៊ីនកិនស្រូវលីអួង</div>
    <h2>គណនាកាលបរិច្ឆេទ</h2>

    <label>ថ្ងៃចាប់ផ្តើម</label>
    <div class="row">
      <select id="sDay"></select>
      <select id="sMonth"></select>
      <select id="sYear"></select>
    </div>

    <label>ថ្ងៃបច្ចុប្បន្ន</label>
    <div class="row">
      <select id="eDay"></select>
      <select id="eMonth"></select>
      <select id="eYear"></select>
    </div>

    <button onclick="calculate()">គណនា</button>

    <div class="result" id="result">
      លទ្ធផលនឹងបង្ហាញទីនេះ
    </div>

    <!-- ប្រអប់សម្រាប់បង្ហាញរូបមន្ត -->
    <div class="formula-section" id="formula"></div>

    <!-- ឈ្មោះអ្នកសរសេរកម្មវិធី -->
    <div class="credit">សរសេរកម្មវិធីដោយៈ វង្ស សាណូវុទ្ធ</div>
  </div>

  <script>
    function fillSelect(id, start, end) {
      const el = document.getElementById(id);
      for (let i = start; i <= end; i++) {
        let val = i.toString().padStart(2, '0');
        let opt = document.createElement('option');
        opt.value = i;
        opt.text = val;
        el.appendChild(opt);
      }
    }

    // Fill dropdowns
    fillSelect('sDay', 1, 31);
    fillSelect('eDay', 1, 31);
    fillSelect('sMonth', 1, 12);
    fillSelect('eMonth', 1, 12);
    fillSelect('sYear', 2000, 2035);
    fillSelect('eYear', 2000, 2035);

    // Set today's date as default for the "Current Date"
    const today = new Date();
    document.getElementById('eDay').value = today.getDate();
    document.getElementById('eMonth').value = today.getMonth() + 1;
    document.getElementById('eYear').value = today.getFullYear();
    
    // Default the start date to the 1st of the current month and year for better UX
    document.getElementById('sDay').value = 1;
    document.getElementById('sMonth').value = today.getMonth() + 1;
    document.getElementById('sYear').value = today.getFullYear();

    function calculate() {
      let start = new Date(
        document.getElementById('sYear').value,
        document.getElementById('sMonth').value - 1,
        document.getElementById('sDay').value
      );

      let end = new Date(
        document.getElementById('eYear').value,
        document.getElementById('eMonth').value - 1,
        document.getElementById('eDay').value
      );

      // Swap if end date is before start date
      if (end < start) {
        [start, end] = [end, start];
      }

      let months = (end.getFullYear() - start.getFullYear()) * 12;
      months += end.getMonth() - start.getMonth();

      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        // Get the number of days in the previous month
        const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += prevMonth.getDate();
      }

      // Calculate total exact days
      const totalDays = Math.floor((end - start) / (1000 * 60 * 60 * 24));

      document.getElementById('result').innerHTML = `
        <span style="color: #15803d; font-weight: bold;">${months} ខែ ${days} ថ្ងៃ</span>
        <span class="total-days">(${totalDays} ថ្ងៃសរុប)</span>
      `;

      // --- ផ្នែកបង្ហាញរូបមន្ត និងវិធីគណនា ---
      let rawMonths = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      let rawDaysDiff = end.getDate() - start.getDate();
      
      let formulaHtml = `<div style="font-weight: bold; margin-bottom: 8px; color: #1d4ed8;">💡 របៀបគណនា៖</div>`;
      formulaHtml += `<div style="margin-bottom: 5px;">• <b>រកខែ៖</b> (${end.getFullYear()} - ${start.getFullYear()}) × ១២ខែ + (${end.getMonth() + 1} - ${start.getMonth() + 1}) = ${rawMonths} ខែ</div>`;
      
      if (rawDaysDiff < 0) {
        // ករណីថ្ងៃខ្វះ ត្រូវខ្ចីខែ
        formulaHtml += `<div style="margin-bottom: 5px;">• <b>រកថ្ងៃ៖</b> ថ្ងៃទី ${end.getDate()} - ថ្ងៃទី ${start.getDate()} = ${rawDaysDiff} ថ្ងៃ (ខ្វះថ្ងៃ ទើបខ្ចី ១ខែ)</div>`;
        formulaHtml += `<div>👉 <b>សរុប៖</b> ដក ១ខែចេញសល់ <b>${months} ខែ</b> និង <b>${days} ថ្ងៃ</b></div>`;
      } else {
        // ករណីថ្ងៃគ្រប់គ្រាន់
        formulaHtml += `<div>• <b>រកថ្ងៃ៖</b> ថ្ងៃទី ${end.getDate()} - ថ្ងៃទី ${start.getDate()} = <b>${days} ថ្ងៃ</b></div>`;
      }
      
      const formulaEl = document.getElementById('formula');
      formulaEl.innerHTML = formulaHtml;
      formulaEl.style.display = 'block'; // បង្ហាញប្រអប់រូបមន្ត
    }
  </script>
</body>
</html>
